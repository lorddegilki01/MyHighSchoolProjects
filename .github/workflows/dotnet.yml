name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        solution:
          - MiniE-TicaretUygulaması/MiniE-TicaretUygulaması.sln
          - MüzikKütüphaneUygulaması/MüzikKütüphaneUygulaması.sln
          - KütüphaneProjesi/KütüphaneProjesi.sln

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "${{ matrix.solution }}"

      - name: Build (Release)
        run: dotnet build "${{ matrix.solution }}" --configuration Release --no-restore -p:UseAppHost=false
