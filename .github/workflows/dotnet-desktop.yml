name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Solutions
        shell: pwsh
        run: |
          $solutions = @(
            "MiniE-TicaretUygulaması/MiniE-TicaretUygulaması.sln",
            "MüzikKütüphaneUygulaması/MüzikKütüphaneUygulaması.sln",
            "KütüphaneProjesi/KütüphaneProjesi.sln"
          )
          foreach ($sln in $solutions) {
            dotnet restore $sln
          }

      - name: Build Solutions
        shell: pwsh
        env:
          Configuration: ${{ matrix.configuration }}
        run: |
          $solutions = @(
            "MiniE-TicaretUygulaması/MiniE-TicaretUygulaması.sln",
            "MüzikKütüphaneUygulaması/MüzikKütüphaneUygulaması.sln",
            "KütüphaneProjesi/KütüphaneProjesi.sln"
          )
          foreach ($sln in $solutions) {
            dotnet build $sln --configuration $env:Configuration --no-restore -p:UseAppHost=false
          }
